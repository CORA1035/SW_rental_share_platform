<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShareRent - 물품 공유 및 대여 플랫폼</title>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Global Navigation Bar -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="#/" class="nav-brand">
                <i data-lucide="share-2" style="color: #7c3aed;"></i>
                <span>ShareRent</span>
            </a>
            
            <div class="nav-links" id="navLinks">
                <!-- Injected dynamically by app.js -->
            </div>

            <div class="nav-user" id="navUser">
                <!-- Injected dynamically by app.js -->
            </div>
        </div>
    </nav>

    <!-- Global Alert Toast Layout -->
    <div class="alert-container" id="alertContainer"></div>

    <!-- Main Dynamic Application view container -->
    <main class="container" id="app">
        <!-- Rendered HTML screens injected here by app.js hash router -->
    </main>

    <footer style="margin-top: 5rem; padding: 2rem 0; text-align: center; border-top: 1px solid var(--border-light); color: var(--text-muted); font-size: 0.85rem;">
        <p>&copy; 2026 ShareRent - 물품 공유 및 대여 서비스. All rights reserved.</p>
    </footer>

    <!-- App Logic Script -->
    <script src="app.js" defer></script>
</body>
</html>
